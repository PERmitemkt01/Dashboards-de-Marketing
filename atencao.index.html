const normalizeText = (value) =>

    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/[._\-/]/g, " ")
    .replace(/\s+/g, " ")
    .trim();

const parseNumber = (value) => {
  if (value === null || value === undefined || value === "") return 0;
  if (typeof value === "number") return Number.isFinite(value) ? value : 0;
  let text = String(value).trim();
  if (!text) return 0;
  const isNegative = text.includes("-");
  text = text.replaceAll("R$", "").replaceAll("r$", "").replaceAll(" ", "").replaceAll(" ", "").trim();
  let cleaned = Array.from(text).filter((char) => "0123456789,.".includes(char)).join("");
  if (!cleaned) return 0;
  const commaCount = cleaned.split(",").length - 1;
  const dotCount = cleaned.split(".").length - 1;
  if (commaCount > 0 && dotCount > 0) {
    const lastComma = cleaned.lastIndexOf(",");
    const lastDot = cleaned.lastIndexOf(".");
    cleaned = lastComma > lastDot ? cleaned.split(".").join("").replace(",", ".") : cleaned.split(",").join("");
  } else if (commaCount > 0) {
    const lastComma = cleaned.lastIndexOf(",");
    const decimalPart = cleaned.slice(lastComma + 1);
    cleaned = commaCount === 1 && decimalPart.length > 0 && decimalPart.length <= 2 ? cleaned.replace(",", ".") : cleaned.split(",").join("");
  } else if (dotCount > 0) {
    const lastDot = cleaned.lastIndexOf(".");
    const decimalPart = cleaned.slice(lastDot + 1);
    const integerPart = cleaned.slice(0, lastDot);
    if (dotCount === 1) {
      if (decimalPart.length === 3 && integerPart.length <= 3) cleaned = integerPart + decimalPart;
      else if (decimalPart.length > 0 && decimalPart.length <= 2) cleaned = integerPart + "." + decimalPart;
      else if (decimalPart.length === 3) cleaned = integerPart + decimalPart;
    } else {
      cleaned = decimalPart.length > 0 && decimalPart.length <= 2 ? cleaned.slice(0, lastDot).split(".").join("") + "." + decimalPart : cleaned.split(".").join("");
    }
  }
  const parsed = Number(cleaned);
  if (!Number.isFinite(parsed)) return 0;
  return isNegative ? -parsed : parsed;
};

const parseDate = (value) => {
  if (!value) return "";
  if (value instanceof Date && !Number.isNaN(value.getTime())) return value.toISOString().slice(0, 10);
  if (typeof value === "number") {
    const parsed = XLSX.SSF.parse_date_code(value);
    if (parsed) return `${parsed.y}-${String(parsed.m).padStart(2, "0")}-${String(parsed.d).padStart(2, "0")}`;
  }
  const raw = String(value).trim();
  const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
  const br = raw.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})$/);
  if (br) {
    const day = br[1].padStart(2, "0");
    const month = br[2].padStart(2, "0");
    const year = br[3].length === 2 ? `20${br[3]}` : br[3];
    return `${year}-${month}-${day}`;
  }
  const parsed = new Date(raw);
  if (!Number.isNaN(parsed.getTime())) return parsed.toISOString().slice(0, 10);
  return raw;
};

};

const inferRegua = (value, campanha, texto) => {

  if (combined.includes("atencao") || combined.includes("atenção")) return "Atenção";
  if (combined.includes("30 dias") || combined.includes("30dias") || combined.includes("cliente inativo")) return "Atenção";
  return value ? String(value) : "Atenção";
};

function analyzePushPreview(message, possuiImagem) {
  const raw = String(message || "").trim();
  const normalized = normalizeText(raw);
  const first35 = raw.slice(0, 35);
  const first50 = raw.slice(0, 50);
  const normalizedFirst50 = normalizeText(first50);
  const weakOpenings = ["ola", "oi", "bom dia", "boa tarde", "boa noite", "tudo bem", "prezado", "cliente"];
  const valueHooks = ["30 dias", "faz 30", "sem usar", "parada", "parado", "volte", "use", "maquininha", "permite", "cartao", "cartão", "vendas", "giro", "poder de compra", "hoje", "agora"];
  const actionHooks = ["volte", "use", "utilize", "fale", "ative", "transacione", "venda", "clique"];
  const riskHooks = ["30 dias", "sem usar", "parada", "parado", "nao deixe", "não deixe", "perde", "perder", "fora da estrategia", "fora da estratégia"];
  const startsWeak = weakOpenings.some((term) => normalized.startsWith(term));
  const hasMediaRisk = possuiImagem === "Sim";
  const formattingWaste = Array.from(raw).filter((char) => ["*", "_", "~", "`"].includes(char)).length;
  const findFirstIndex = (text, terms) => {
    const indexes = terms.map((term) => text.indexOf(normalizeText(term))).filter((index) => index >= 0);
    return indexes.length ? Math.min(...indexes) : -1;
  };
  const firstValueIndex = findFirstIndex(normalizedFirst50, valueHooks);
  const hasValueIn50 = firstValueIndex >= 0;
  const hasActionIn50 = actionHooks.some((term) => normalizedFirst50.includes(normalizeText(term)));
  const hasRiskIn50 = riskHooks.some((term) => normalizedFirst50.includes(normalizeText(term)));
  const startsWithDirectValue = ["faz 30", "30 dias", "volte", "use", "nao deixe", "não deixe", "sua permite"].some((term) => normalized.startsWith(normalizeText(term)));
  let positionScore = 0;
  if (firstValueIndex >= 0 && firstValueIndex <= 12) positionScore = 0.24;
  else if (firstValueIndex >= 0 && firstValueIndex <= 35) positionScore = 0.16;
  else if (firstValueIndex >= 0 && firstValueIndex <= 50) positionScore = 0.09;
  const actionScore = hasActionIn50 ? 0.16 : 0;
  const riskScore = hasRiskIn50 ? 0.14 : 0;
  const clarityScore = (!startsWeak ? 0.08 : 0) + (normalizedFirst50.split(" ").filter(Boolean).length <= 10 ? 0.06 : 0) + (formattingWaste === 0 ? 0.04 : 0);
  const mediaScore = hasMediaRisk ? 0.04 : 0.1;
  const directScore = startsWithDirectValue ? 0.18 : 0;
  const score = Math.min(positionScore + actionScore + riskScore + clarityScore + mediaScore + directScore, 1);
  let classificacao = "Baixa";
  if (score >= 0.78) classificacao = "Forte";
  else if (score >= 0.6) classificacao = "Boa";
  else if (score >= 0.42) classificacao = "Regular";
  let diretiva = "Começar com 30 dias sem uso, perda evitada ou ação clara nos primeiros 35 a 50 caracteres.";
  if (startsWeak) diretiva = "Evitar saudação longa e abrir direto com o alerta de 30 dias sem uso.";
  else if (!hasActionIn50) diretiva = "Antecipar ação clara na prévia: volte, use, venda, transacione ou fale com vendedor.";
  else if (!hasRiskIn50) diretiva = "Testar aversão à perda: 30 dias sem uso, maquininha parada ou vendas fora da estratégia.";
  else if (hasMediaRisk) diretiva = "Testar versão sem imagem para não esconder o texto da notificação.";
  return {
    pushPreview35: first35,
    pushPreview50: first50,
    pushScore: score,
    pushClassificacao: classificacao,
    pushHasValueIn50: hasValueIn50 ? "Sim" : "Não",
    pushHasActionIn50: hasActionIn50 ? "Sim" : "Não",
    pushHasRiskIn50: hasRiskIn50 ? "Sim" : "Não",
    pushStartsWeak: startsWeak ? "Sim" : "Não",
    pushMediaRisk: hasMediaRisk ? "Sim" : "Não",
    pushDiretiva: diretiva,
  };
}

function classifyCommunication(message) {
  const text = normalizeText(message);
  const words = text ? text.split(" ").filter(Boolean).length : 0;
  const chars = String(message || "").length;
  const signals = {
    atencao30: hasAny(text, ["30 dias", "faz 30", "um mês", "um mes", "sem usar"]),
    retornoUso: hasAny(text, ["volte", "voltar", "retomar", "use novamente", "reativar", "ative", "use a maquininha", "use a permite"]),
    tpv: hasAny(text, ["tpv", "transacione", "transacionar", "valor transacionado", "vendas no cartao", "vendas no cartão"]),
    dorParada: hasAny(text, ["parado", "parada", "sem usar", "atenção", "atencao", "fora da estrategia", "fora da estratégia"]),
    perda: hasAny(text, ["perde", "perder", "nao deixe", "não deixe", "deixando de", "oportunidade", "giro"]),
    beneficioFinanceiro: hasAny(text, ["poder de compra", "caixa", "sem taxa", "antecipacao", "antecipação", "controle", "saldo", "limite"]),
    estoque: hasAny(text, ["peças", "pecas", "estoque", "repor", "reposicao", "reposição"]),
    suporte: hasAny(text, ["fale", "vendedor", "atendente", "especialista", "ajuda", "apoio"]),
    urgencia: hasAny(text, ["hoje", "agora", "aviso", "importante", "prazo", "urgente"]),
    cta: hasAny(text, ["clique", "fale", "acesse", "use", "utilize", "volte", "transacione", "venda", "ative"]),
    exclusividade: hasAny(text, ["exclusivo", "exclusiva", "grupo real", "cliente"]),
  };

  let abordagem = "Alerta de 30 dias sem uso";
  if (signals.atencao30 && signals.perda) abordagem = "Atenção: 30 dias + aversão à perda";
  else if (signals.retornoUso && signals.tpv) abordagem = "Retorno ao uso + TPV";
  else if (signals.dorParada && signals.perda) abordagem = "Aversão à perda: maquininha parada";
  else if (signals.beneficioFinanceiro && signals.estoque) abordagem = "Poder de compra + reposição";
  else if (signals.suporte && signals.retornoUso) abordagem = "Apoio consultivo para retomada";
  else if (signals.urgencia && signals.retornoUso) abordagem = "Urgência para voltar a usar";

  let promessaPrincipal = "Voltar a usar após 30 dias";
  if (signals.tpv && signals.beneficioFinanceiro) promessaPrincipal = "Transformar TPV em poder de compra";
  else if (signals.perda) promessaPrincipal = "Evitar perda de giro";
  else if (signals.estoque) promessaPrincipal = "Voltar a vender para repor peças";
  else if (signals.suporte) promessaPrincipal = "Apoio para retomar uso";

  let ctaTipo = "Sem CTA claro";
  if (hasAny(text, ["fale", "vendedor", "atendente"])) ctaTipo = "Falar com vendedor/atendente";
  else if (hasAny(text, ["use", "utilize", "volte", "transacione"])) ctaTipo = "Voltar a usar / transacionar";
  else if (hasAny(text, ["clique", "acesse"])) ctaTipo = "Clique / acesso";

  let neuroGatilho = "Baixa ativação persuasiva";
  if (signals.atencao30 && (signals.dorParada || signals.perda)) neuroGatilho = "Alerta de inatividade e aversão à perda";
  else if (signals.dorParada || signals.perda) neuroGatilho = "Aversão à perda e retomada";
  else if (signals.retornoUso && signals.tpv) neuroGatilho = "Retorno ao hábito de uso";
  else if (signals.beneficioFinanceiro) neuroGatilho = "Controle financeiro e poder de compra";
  else if (signals.suporte) neuroGatilho = "Redução de fricção e segurança";
  else if (signals.exclusividade) neuroGatilho = "Exclusividade e pertencimento";

  let oportunidadeMarketing = "Reforçar alerta de 30 dias sem uso com CTA claro";
  if (!signals.atencao30) oportunidadeMarketing = "Citar 30 dias sem uso logo no início para contextualizar a régua";
  else if (!signals.retornoUso) oportunidadeMarketing = "Abrir a mensagem com convite claro para voltar a usar a maquininha";
  else if (!signals.tpv) oportunidadeMarketing = "Conectar retomada de uso com TPV transacionado";
  else if (!signals.perda && !signals.urgencia) oportunidadeMarketing = "Adicionar aversão à perda ou urgência leve";
  else if (!signals.cta) oportunidadeMarketing = "Incluir CTA direto para transacionar ou falar com vendedor";

  const clarezaScore = (signals.cta ? 1 : 0) + (words >= 10 && words <= 55 ? 1 : 0) + (chars <= 420 ? 1 : 0) + (promessaPrincipal !== "Voltar a usar após 30 dias" ? 1 : 0);
  const neuroScore = (signals.atencao30 ? 1 : 0) + (signals.retornoUso ? 1 : 0) + (signals.tpv ? 1 : 0) + (signals.perda ? 1 : 0) + (signals.beneficioFinanceiro ? 1 : 0) + (signals.cta ? 1 : 0);
  const sourceFitScore = Math.min(((signals.atencao30 ? 1 : 0) + (signals.retornoUso ? 1 : 0) + (signals.perda ? 1 : 0) + (signals.tpv ? 1 : 0) + (signals.cta ? 1 : 0) + (signals.beneficioFinanceiro ? 1 : 0) + (signals.estoque ? 1 : 0)) / 7, 1);

  return {
    abordagem, promessaPrincipal, ctaTipo, neuroGatilho, oportunidadeMarketing,
    palavrasMensagem: words, tamanhoMensagem: chars, clarezaScore, neuroScore, sourceFitScore,
    possuiAtencao30: signals.atencao30 ? "Sim" : "Não",
    possuiRetornoUso: signals.retornoUso ? "Sim" : "Não",
    possuiTPV: signals.tpv ? "Sim" : "Não",
    possuiPerda: signals.perda ? "Sim" : "Não",
    possuiDorParada: signals.dorParada ? "Sim" : "Não",
    possuiBeneficioFinanceiro: signals.beneficioFinanceiro ? "Sim" : "Não",
    possuiEstoque: signals.estoque ? "Sim" : "Não",
    possuiSuporte: signals.suporte ? "Sim" : "Não",
    possuiUrgencia: signals.urgencia ? "Sim" : "Não",
    possuiCTA: signals.cta ? "Sim" : "Não",
  };
}

function findColumn(headers, aliases) {
  const normalizedHeaders = headers.map((header) => ({ original: header, normalized: normalizeText(header) }));
  for (const alias of aliases) {
    const normalizedAlias = normalizeText(alias);
    const exact = normalizedHeaders.find((header) => header.normalized === normalizedAlias);
    if (exact) return exact.original;
  }
  for (const alias of aliases) {
    const normalizedAlias = normalizeText(alias);
    const partial = normalizedHeaders.find((header) => header.normalized.includes(normalizedAlias) || normalizedAlias.includes(header.normalized));
    if (partial) return partial.original;
  }
  return null;
}

function worksheetToObjects(worksheet) {
  const matrix = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "", raw: true });
  const nonEmptyRows = matrix.filter((line) => Array.isArray(line) && line.some((cell) => String(cell ?? "").trim() !== ""));
  if (!nonEmptyRows.length) return { rows: [], headerRowIndex: -1, headers: [] };
  let bestIndex = 0;
  let bestScore = -1;
  nonEmptyRows.slice(0, 25).forEach((line, index) => {
    const headers = line.map((cell) => String(cell ?? "").trim());
    const score = Object.values(COLUMN_ALIASES).reduce((total, aliases) => total + (findColumn(headers, aliases) ? 1 : 0), 0);
    if (score > bestScore) { bestScore = score; bestIndex = index; }
  });
  const headers = nonEmptyRows[bestIndex].map((cell, index) => String(cell ?? "").trim() || `Coluna ${index + 1}`);
  const dataRows = nonEmptyRows.slice(bestIndex + 1).map((line) => {
    const obj = {};
    headers.forEach((header, index) => { obj[header] = line[index] ?? ""; });
    return obj;
  });
  return { rows: dataRows, headerRowIndex: bestIndex + 1, headers };
}

function hashText(text) {
  const normalized = normalizeText(text);
  let hash = 0;
  for (let i = 0; i < normalized.length; i += 1) hash = ((hash << 5) - hash + normalized.charCodeAt(i)) | 0;
  return `atencao_modelo_${Math.abs(hash).toString(36).slice(0, 6)}`;
}

function mapRows(rows) {
  if (!rows.length) return [];
  const headers = Object.keys(rows[0] || {});
  const columns = Object.fromEntries(Object.entries(COLUMN_ALIASES).map(([key, aliases]) => [key, findColumn(headers, aliases)]));

  return rows.map((row, index) => {
    const textoMensagem = String(row[columns.textoMensagem] ?? "").trim();
    const auto = classifyCommunication(textoMensagem);
    const campanha = row[columns.campanha] ?? `Campanha ${index + 1}`;
    const rawTemplate = String(row[columns.idTemplate] ?? "").trim();
    const mapped = {
      id: index,
      campanha,
      regua: inferRegua(row[columns.regua], campanha, textoMensagem),
      dataEnvio: parseDate(row[columns.dataEnvio]),
      idTemplate: rawTemplate || (textoMensagem ? hashText(textoMensagem) : `Sem ID Template ${index + 1}`),
      textoMensagem,
      possuiImagem: normalizeYesNo(row[columns.possuiImagem]),
      enviados: parseNumber(row[columns.enviados]),
      erros: parseNumber(row[columns.erros]),
      recebidos: parseNumber(row[columns.recebidos]),
      lidos: parseNumber(row[columns.lidos]),
      tpv: parseNumber(row[columns.tpv]),
      ...auto,
    };
    Object.assign(mapped, analyzePushPreview(mapped.textoMensagem, mapped.possuiImagem));

    const headerSignals = [mapped.campanha, rawTemplate, mapped.textoMensagem, row[columns.enviados], row[columns.lidos], row[columns.tpv]].filter(isHeaderLikeValue).length;
    const hasRealMetric = mapped.enviados > 0 || mapped.recebidos > 0 || mapped.lidos > 0 || mapped.tpv > 0;
    const hasRealCopy = normalizeText(mapped.textoMensagem).length > 8 && !isHeaderLikeValue(mapped.textoMensagem);
    if (headerSignals >= 2 || (!hasRealMetric && !hasRealCopy)) return null;

    const taxaEntrega = safeDiv(mapped.recebidos, mapped.enviados);
    const taxaErro = safeDiv(mapped.erros, mapped.enviados);
    const taxaLeitura = safeDiv(mapped.lidos, mapped.recebidos);
    const engajamentoGeral = safeDiv(mapped.lidos, mapped.enviados);
    const scoreRetomada = taxaLeitura * 0.28 + taxaEntrega * 0.1 + (1 - taxaErro) * 0.08 + safeDiv(mapped.clarezaScore, 4) * 0.14 + Math.min(safeDiv(mapped.neuroScore, 6), 1) * 0.16 + (mapped.sourceFitScore || 0) * 0.14 + (mapped.pushScore || 0) * 0.1;

    return { ...mapped, taxaEntrega, taxaErro, taxaLeitura, engajamentoGeral, scoreRetomada, naoLidos: Math.max(mapped.recebidos - mapped.lidos, 0) };
  }).filter((row) => row && (row.enviados || row.recebidos || row.lidos || row.tpv || row.textoMensagem));
}

function aggregate(rows, groupKey) {
  const map = new Map();
  rows.forEach((row) => {
    const key = groupKey(row) || "Não informado";
    if (!map.has(key)) {
      map.set(key, {
        nome: key, campanhas: 0, enviados: 0, erros: 0, recebidos: 0, lidos: 0, tpv: 0,
        scoreTotal: 0, clarezaTotal: 0, neuroTotal: 0, pushTotal: 0, sourceFitTotal: 0, exemplos: [],
        reguas: new Map(), abordagens: new Map(), promessas: new Map(), ctas: new Map(), neuros: new Map(), oportunidades: new Map(), imagens: new Map()
      });
    }
    const item = map.get(key);
    item.campanhas += 1;
    item.enviados += row.enviados || 0;
    item.erros += row.erros || 0;
    item.recebidos += row.recebidos || 0;
    item.lidos += row.lidos || 0;
    item.tpv += row.tpv || 0;
    item.scoreTotal += row.scoreRetomada || 0;
    item.clarezaTotal += row.clarezaScore || 0;
    item.neuroTotal += row.neuroScore || 0;
    item.pushTotal += row.pushScore || 0;
    item.sourceFitTotal += row.sourceFitScore || 0;
    if (row.textoMensagem && item.exemplos.length < 2) item.exemplos.push(row.textoMensagem);
    item.reguas.set(row.regua, (item.reguas.get(row.regua) || 0) + 1);
    item.abordagens.set(row.abordagem, (item.abordagens.get(row.abordagem) || 0) + 1);
    item.promessas.set(row.promessaPrincipal, (item.promessas.get(row.promessaPrincipal) || 0) + 1);
    item.ctas.set(row.ctaTipo, (item.ctas.get(row.ctaTipo) || 0) + 1);
    item.neuros.set(row.neuroGatilho, (item.neuros.get(row.neuroGatilho) || 0) + 1);
    item.oportunidades.set(row.oportunidadeMarketing, (item.oportunidades.get(row.oportunidadeMarketing) || 0) + 1);
    item.imagens.set(row.possuiImagem, (item.imagens.get(row.possuiImagem) || 0) + 1);
  });
  return Array.from(map.values()).map((item) => {
    const topEntry = (mapObj) => Array.from(mapObj.entries()).sort((a, b) => b[1] - a[1])[0]?.[0] || "Não informado";
    const taxaEntrega = safeDiv(item.recebidos, item.enviados);
    const taxaErro = safeDiv(item.erros, item.enviados);
    const taxaLeitura = safeDiv(item.lidos, item.recebidos);
    return {
      ...item,
      taxaEntrega, taxaErro, taxaLeitura, engajamentoGeral: safeDiv(item.lidos, item.enviados),
      resultadoPorLido: safeDiv(item.tpv, item.lidos), scoreRetomada: safeDiv(item.scoreTotal, item.campanhas),
      clarezaMedia: safeDiv(item.clarezaTotal, item.campanhas), neuroMedia: safeDiv(item.neuroTotal, item.campanhas),
      pushMedio: safeDiv(item.pushTotal, item.campanhas), sourceFitMedio: safeDiv(item.sourceFitTotal, item.campanhas),
      reguaPrincipal: topEntry(item.reguas), abordagemPrincipal: topEntry(item.abordagens), promessaPrincipal: topEntry(item.promessas),
      ctaPrincipal: topEntry(item.ctas), neuroPrincipal: topEntry(item.neuros), oportunidadePrincipal: topEntry(item.oportunidades), imagemPrincipal: topEntry(item.imagens),
    };
  });
}

  const pushPreviewSummary = useMemo(() => {

          <div className="mb-4 flex items-center gap-2"><span className="text-[#dd2145]">✨</span><h3 className="font-bold">Top 2 templates por TPV gerado</h3></div>
          <p className="mb-4 text-sm text-zinc-500">Analisa os 2 templates que mais geraram TPV após a comunicação, priorizando retomada real de uso da maquininha.</p>
          <div className="overflow-hidden rounded-2xl border border-zinc-200"><div className="max-h-[520px] overflow-auto thin-scrollbar"><table className="w-full min-w-[1150px] border-collapse text-sm"><thead className="sticky top-0 z-10 bg-[#262626] text-white"><tr><th className="px-3 py-3 text-left">ID Template</th><th className="px-3 py-3 text-left">Régua</th><th className="px-3 py-3 text-left">Abordagem</th><th className="px-3 py-3 text-left">Promessa</th><th className="px-3 py-3 text-left">Neuromarketing</th><th className="px-3 py-3 text-right">Recebidos</th><th className="px-3 py-3 text-right">Lidos</th><th className="px-3 py-3 text-right">TPV</th><th className="px-3 py-3 text-right">Tx. leitura</th><th className="px-3 py-3 text-right">Score</th></tr></thead><tbody>{ranking.map((row) => <tr key={row.nome} className="border-b border-zinc-100 odd:bg-white even:bg-zinc-50"><td className="px-3 py-3 font-bold text-[#262626]">{row.nome}</td><td className="px-3 py-3">{row.reguaPrincipal}</td><td className="px-3 py-3">{row.abordagemPrincipal}</td><td className="px-3 py-3">{row.promessaPrincipal}</td><td className="px-3 py-3">{row.neuroPrincipal}</td><td className="px-3 py-3 text-right">{num(row.recebidos)}</td><td className="px-3 py-3 text-right">{num(row.lidos)}</td><td className="px-3 py-3 text-right font-bold text-[#dd2145]">{money(row.tpv)}</td><td className="px-3 py-3 text-right">{pct(row.taxaLeitura)}</td><td className="px-3 py-3 text-right font-bold">{pct(row.scoreRetomada)}</td></tr>)}</tbody></table></div></div>
        </section>

        <section className="mt-6 grid gap-4 lg:grid-cols-3">
          <div className="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm lg:col-span-2"><div className="mb-3 flex items-center gap-2"><span className="text-[#dd2145]">💡</span><h3 className="font-bold">Insights estratégicos automáticos</h3></div><div className="grid gap-3 md:grid-cols-2">{insights.map((item, index) => <div key={index} className="rounded-2xl bg-zinc-50 p-4 text-sm leading-6 text-zinc-700"><span className="font-bold text-[#dd2145]">{index + 1}. </span>{item}</div>)}</div></div>
          <div className="rounded-2xl border border-[#dd2145]/20 bg-[#dd2145]/5 p-5 shadow-sm"><div className="mb-3 flex items-center gap-2"><span className="text-[#dd2145]">🎯</span><h3 className="font-bold">Melhor direção</h3></div><p className="text-sm font-bold leading-6 text-[#262626]">{bestDirection.headline}</p><p className="mt-2 text-sm leading-6 text-zinc-700">{bestDirection.body}</p><p className="mt-3 rounded-2xl bg-white p-3 text-sm font-semibold leading-6 text-[#dd2145]">{bestDirection.action}</p></div>
        </section>

        <section className="mt-6 rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm"><div className="mb-4 flex items-center gap-2"><span className="text-[#dd2145]">📌</span><h3 className="font-bold">Leitura executiva da efetividade da régua</h3></div><p className="mb-4 text-sm leading-6 text-zinc-600">A leitura executiva consolida a saúde da Régua Atenção em quatro dimensões: força de leitura, entrega, risco operacional e clareza persuasiva.</p><div className="grid gap-4 md:grid-cols-4">{healthSummary.map((item) => <div key={item.titulo} className="rounded-2xl bg-zinc-50 p-4 ring-1 ring-zinc-100"><p className="text-xs font-semibold uppercase tracking-[0.16em] text-zinc-500">{item.titulo}</p><p className="mt-2 text-2xl font-bold text-[#dd2145]">{item.valor}</p><p className="mt-2 text-sm leading-6 text-zinc-600">{item.texto}</p></div>)}</div></section>

        <section className="mt-6 grid gap-4 xl:grid-cols-2">
          <ChartCard title="TPV por template" subtitle="Mostra quais templates geraram maior valor transacionado após a comunicação." source={CHART_SOURCE_NOTES.tpvTemplate}><ResponsiveContainer width="100%" height="100%"><BarChart data={byTemplate.slice(0, 10)} margin={{ top: 10, right: 15, left: 0, bottom: 70 }}><CartesianGrid strokeDasharray="3 3" /><XAxis dataKey="nome" angle={-25} textAnchor="end" height={95} tick={{ fontSize: 11 }} /><YAxis tickFormatter={(value) => money(value)} /><Tooltip content={<CustomTooltip />} /><Bar dataKey="tpv" name="TPV" fill={BRAND_RED} radius={[8, 8, 0, 0]} /></BarChart></ResponsiveContainer></ChartCard>
          <ChartCard title="TPV por régua" subtitle="Consolida o retorno da base Atenção." source={CHART_SOURCE_NOTES.regua}><ResponsiveContainer width="100%" height="100%"><BarChart data={byRegua} margin={{ top: 10, right: 15, left: 0, bottom: 20 }}><CartesianGrid strokeDasharray="3 3" /><XAxis dataKey="nome" /><YAxis tickFormatter={(value) => money(value)} /><Tooltip content={<CustomTooltip />} /><Legend /><Bar dataKey="tpv" name="TPV" fill={BRAND_RED} radius={[8, 8, 0, 0]} /><Bar dataKey="taxaLeitura" name="Taxa leitura" fill={BRAND_DARK} radius={[8, 8, 0, 0]} /></BarChart></ResponsiveContainer></ChartCard>
          <ChartCard title="Gatilho por score de retomada" subtitle="Mostra qual mecanismo persuasivo teve maior força de resposta." source={CHART_SOURCE_NOTES.gatilho}><ResponsiveContainer width="100%" height="100%"><BarChart data={byNeuro.slice(0, 10)} margin={{ top: 10, right: 15, left: 0, bottom: 70 }}><CartesianGrid strokeDasharray="3 3" /><XAxis dataKey="nome" angle={-25} textAnchor="end" height={95} tick={{ fontSize: 11 }} /><YAxis tickFormatter={(value) => `${Math.round(value * 100)}%`} /><Tooltip content={<CustomTooltip />} /><Bar dataKey="scoreRetomada" name="Score retomada" fill={BRAND_RED} radius={[8, 8, 0, 0]} /></BarChart></ResponsiveContainer></ChartCard>
          <ChartCard title="Promessa principal por TPV" subtitle="Mostra qual promessa mais se conectou à retomada de uso." source={CHART_SOURCE_NOTES.promessa}><ResponsiveContainer width="100%" height="100%"><BarChart data={byPromessa.slice(0, 10)} margin={{ top: 10, right: 15, left: 0, bottom: 70 }}><CartesianGrid strokeDasharray="3 3" /><XAxis dataKey="nome" angle={-25} textAnchor="end" height={95} tick={{ fontSize: 11 }} /><YAxis tickFormatter={(value) => money(value)} /><Tooltip content={<CustomTooltip />} /><Bar dataKey="tpv" name="TPV" fill={BRAND_RED} radius={[8, 8, 0, 0]} /></BarChart></ResponsiveContainer></ChartCard>
          <ChartCard title="CTA x score de retomada" subtitle="Avalia se o próximo passo ajudou o cliente a voltar a transacionar." source={CHART_SOURCE_NOTES.cta}><ResponsiveContainer width="100%" height="100%"><BarChart data={byCTA} margin={{ top: 10, right: 15, left: 0, bottom: 70 }}><CartesianGrid strokeDasharray="3 3" /><XAxis dataKey="nome" angle={-25} textAnchor="end" height={95} tick={{ fontSize: 11 }} /><YAxis tickFormatter={(value) => `${Math.round(value * 100)}%`} /><Tooltip content={<CustomTooltip />} /><Bar dataKey="scoreRetomada" name="Score retomada" fill={BRAND_RED} radius={[8, 8, 0, 0]} /></BarChart></ResponsiveContainer></ChartCard>
          <ChartCard title="Com imagem vs sem imagem" subtitle="Compara formato visual com TPV e leitura." source={CHART_SOURCE_NOTES.push}><ResponsiveContainer width="100%" height="100%"><BarChart data={byImagem} margin={{ top: 10, right: 15, left: 0, bottom: 20 }}><CartesianGrid strokeDasharray="3 3" /><XAxis dataKey="nome" /><YAxis tickFormatter={(value) => money(value)} /><Tooltip content={<CustomTooltip />} /><Legend /><Bar dataKey="tpv" name="TPV" fill={BRAND_RED} radius={[8, 8, 0, 0]} /><Bar dataKey="taxaLeitura" name="Taxa leitura" fill={BRAND_DARK} radius={[8, 8, 0, 0]} /></BarChart></ResponsiveContainer></ChartCard>
          <ChartCard title="Leitura x TPV" subtitle="Ajuda a entender se mais leitura acompanhou maior retomada." source={CHART_SOURCE_NOTES.volume}><ResponsiveContainer width="100%" height="100%"><ScatterChart margin={{ top: 10, right: 15, left: 0, bottom: 20 }}><CartesianGrid strokeDasharray="3 3" /><XAxis dataKey="x" name="Lidos" /><YAxis dataKey="y" name="TPV" tickFormatter={(value) => money(value)} /><ZAxis dataKey="z" range={[80, 420]} /><Tooltip content={<CustomTooltip />} /><Scatter name="Templates" data={scatterData} fill={BRAND_RED} /></ScatterChart></ResponsiveContainer></ChartCard>
          <div className="rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm"><div className="mb-4 flex items-center gap-2"><span className="text-[#dd2145]">💡</span><h3 className="text-base font-bold text-[#262626]">Análise de leitura x TPV</h3></div><div className="rounded-2xl bg-[#dd2145]/5 p-4 ring-1 ring-[#dd2145]/10"><p className="text-xs font-semibold uppercase tracking-[0.16em] text-zinc-500">Leitura principal</p><p className="mt-2 text-lg font-bold text-[#262626]">{performanceAnalysis.titulo}</p><p className="mt-2 text-sm leading-6 text-zinc-700">{performanceAnalysis.resumo}</p></div><div className="mt-4 space-y-2">{performanceAnalysis.pontos.map((item, index) => <div key={index} className="rounded-xl bg-zinc-50 p-3 text-sm leading-6 text-zinc-700 ring-1 ring-zinc-100"><span className="font-bold text-[#dd2145]">{index + 1}. </span>{item}</div>)}</div><div className="mt-4 rounded-2xl bg-zinc-50 p-4 text-sm font-semibold leading-6 text-[#262626] ring-1 ring-zinc-100">{performanceAnalysis.direcao}</div></div>
        </section>

        <section className="mt-6 rounded-2xl border border-zinc-200 bg-white p-5 shadow-sm"><div className="mb-4 flex items-center gap-2"><span className="text-[#dd2145]">⚠️</span><h3 className="font-bold">Como o dashboard classifica a Régua Atenção</h3></div><div className="grid gap-3 md:grid-cols-2"><div className="rounded-2xl bg-zinc-50 p-4"><p className="font-bold">1. TPV como sinal de retomada</p><p className="mt-1 text-sm leading-6 text-zinc-600">O TPV indica que o cliente voltou a transacionar após identificar a comunicação.</p></div><div className="rounded-2xl bg-zinc-50 p-4"><p className="font-bold">2. Leitura como sinal de atenção</p><p className="mt-1 text-sm leading-6 text-zinc-600">A taxa de leitura mostra se a mensagem conseguiu gerar interesse suficiente para ser aberta.</p></div><div className="rounded-2xl bg-zinc-50 p-4"><p className="font-bold">3. Score de retomada</p><p className="mt-1 text-sm leading-6 text-zinc-600">Combina leitura, entrega, clareza, força persuasiva, prévia push e aderência estratégica.</p></div><div className="rounded-2xl bg-zinc-50 p-4"><p className="font-bold">4. Validação humana</p><p className="mt-1 text-sm leading-6 text-zinc-600">A classificação é automática e deve ser revisada em mensagens ambíguas ou campanhas com amostra pequena.</p></div></div></section>

        <section className="mt-6 rounded-2xl border border-zinc-200 bg-[#262626] p-5 text-white shadow-sm"><div className="mb-4 flex items-center gap-2"><span className="text-[#dd2145]">🧠</span><h3 className="font-bold">Assinatura metodológica das fontes utilizadas</h3></div><p className="mb-4 text-sm leading-6 text-zinc-300">As análises, rankings, scores e diretivas deste dashboard combinam TPV, engajamento, neurovendas, marketing estratégico, posicionamento, tomada de decisão e comportamento B2B.</p><div className="grid gap-4 md:grid-cols-2 xl:grid-cols-4">{SOURCE_SIGNATURE.map((item) => <div key={item.nome} className="rounded-2xl border border-white/10 bg-white/5 p-4"><p className="text-sm font-bold text-white">{item.nome}</p><p className="mt-2 text-sm leading-6 text-zinc-300">{item.uso}</p></div>)}<div className="rounded-2xl border border-[#dd2145]/40 bg-[#dd2145]/15 p-4 ring-1 ring-[#dd2145]/20"><p className="text-xs font-semibold uppercase tracking-[0.16em] text-[#dd2145]">Aplicação prática</p><p className="mt-2 text-sm font-bold text-white">Aplicação na PERmite</p><p className="mt-2 text-sm leading-6 text-zinc-200">A Régua Atenção é avaliada pela capacidade de transformar alerta de 30 dias sem uso em retomada de transação, medida pelo TPV após a comunicação.</p></div></div></section>
      </div>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<DashboardReguaAtencaoPERmite />);
  </script>
</body>
</html>
